<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMILE</title>
<style>
body {
    margin:0;
    background:black;
}

/* кнопка сверху */
#start {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:50px;
    cursor:pointer;
    z-index:9999;
}

/* видео под кнопкой */
video {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
}
</style>
</head>
<body>

<div id="start">CLICK</div>

<video id="vid">
    <source src="https://parad1st.github.io/Screamer/video.mp4" type="video/mp4">
</video>

<script>
const start = document.getElementById("start");
const vid = document.getElementById("vid");

start.onclick = () => {
    start.style.display = "none";

    document.documentElement.requestFullscreen();

    vid.muted = false;
    vid.volume = 1;
    vid.play();
};
</script>

</body>
</html>
