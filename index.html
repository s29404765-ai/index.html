<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMILE</title>
<style>
body {
    margin:0;
    background:black;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-size:50px;
}
video {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>
<body>

<div>CLICK ANYWHERE</div>

<video id="vid">
    <source src="https://parad1st.github.io/Screamer/video.mp4" type="video/mp4">
</video>

<script>
const vid = document.getElementById("vid");

// ловим клик по ВСЕЙ странице
document.body.addEventListener("click", () => {
    document.documentElement.requestFullscreen();

    vid.muted = false;
    vid.volume = 1;
    vid.play();
});
</script>

</body>
</html>
